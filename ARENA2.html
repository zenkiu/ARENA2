<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARENA2 · Diccionario de Datos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0e0f13;
  --bg2:     #13151b;
  --bg3:     #181b23;
  --bg4:     #1e222e;
  --border:  #2a2f3d;
  --border2: #353c50;
  --cyan:    #00e5c8;
  --cyan2:   #00b4a0;
  --green:   #39ff8a;
  --red:     #ff4444;
  --text:    #c8cfe0;
  --text2:   #7a8499;
  --text3:   #4a5166;
  --white:   #eef0f5;
  --mono:    'JetBrains Mono', monospace;
  --warn:    #ffb347;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--mono); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
}

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 36px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg); position: relative;
}
header::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, var(--cyan) 0%, transparent 55%);
}
.header-left { display: flex; align-items: baseline; gap: 18px; }
.app-title { font-size: 1.75rem; font-weight: 700; color: var(--white); letter-spacing: -0.5px; }
.app-title span { color: var(--cyan); font-style: italic; }
.app-badge {
  font-size: 0.6rem; font-weight: 600; letter-spacing: 2px; color: var(--text3);
  border: 1px solid var(--border2); padding: 3px 10px; border-radius: 2px;
  text-transform: uppercase; align-self: center;
}
.brand {
  display: flex; align-items: center; gap: 7px;
  font-size: 0.88rem; color: var(--text2); letter-spacing: 0.5px;
  text-decoration: none; transition: color 0.2s; opacity: 0.85;
}
.brand:hover { color: var(--cyan); opacity: 1; }
.brand-z {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; background: var(--cyan); color: var(--bg);
  font-size: 0.85rem; font-weight: 700; border-radius: 2px;
  box-shadow: 0 0 14px rgba(0,229,200,0.45); flex-shrink: 0;
}

/* TOOLBAR */
.toolbar {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 36px; background: var(--bg2); border-bottom: 1px solid var(--border);
}
.toolbar-label {
  font-size: 0.58rem; letter-spacing: 2.5px; color: var(--cyan); font-weight: 600;
  text-transform: uppercase; white-space: nowrap; padding-right: 12px;
  border-right: 1px solid var(--border2);
}
.search-wrap { flex: 1; position: relative; display: flex; align-items: center; }
.search-wrap svg { position: absolute; left: 12px; color: var(--text3); pointer-events: none; }
.search-wrap input {
  width: 100%; padding: 9px 14px 9px 38px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 3px;
  color: var(--white); font-family: var(--mono); font-size: 0.8rem;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 0.3px;
}
.search-wrap input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 2px rgba(0,229,200,0.08), inset 0 0 20px rgba(0,229,200,0.03);
}
.search-wrap input::placeholder { color: var(--text3); }
.search-counter { font-size: 0.68rem; color: var(--cyan2); white-space: nowrap; letter-spacing: 1px; min-width: 90px; text-align: right; }

/* VIDEO BTN */
.btn-video {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 18px; background: transparent;
  border: 1px solid var(--red); color: var(--red);
  font-family: var(--mono); font-size: 0.63rem; font-weight: 600;
  letter-spacing: 1.8px; text-transform: uppercase; cursor: pointer;
  border-radius: 2px; white-space: nowrap; text-decoration: none;
  transition: background 0.15s, color 0.15s, box-shadow 0.15s;
}
.btn-video:hover { background: var(--red); color: #fff; box-shadow: 0 0 18px rgba(255,68,68,0.35); }
.play-icon {
  width: 16px; height: 16px; background: var(--red); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s;
}
.btn-video:hover .play-icon { background: #fff; }
.play-icon::after {
  content: ''; width: 0; height: 0;
  border-top: 4px solid transparent; border-bottom: 4px solid transparent;
  border-left: 6px solid #fff; margin-left: 2px; transition: border-left-color 0.15s;
}
.btn-video:hover .play-icon::after { border-left-color: var(--red); }

/* LAYOUT */
.layout { display: flex; height: calc(100vh - 117px); }

/* SIDEBAR */
.sidebar {
  width: 265px; min-width: 200px; background: var(--bg2);
  overflow-y: auto; border-right: 1px solid var(--border); flex-shrink: 0;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.sidebar-section {
  padding: 10px 16px 5px; font-size: 0.53rem; letter-spacing: 2.5px;
  color: var(--text3); text-transform: uppercase; font-weight: 600;
}
.tab-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 8px 14px 8px 16px; text-align: left;
  background: transparent; border: none; border-bottom: 1px solid rgba(42,47,61,0.45);
  color: var(--text2); font-size: 0.71rem; font-family: var(--mono); font-weight: 400;
  cursor: pointer; transition: all 0.12s; letter-spacing: 0.2px;
}
.tab-btn span.name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.tab-btn:hover { background: var(--bg3); color: var(--white); }
.tab-btn.active {
  background: rgba(0,229,200,0.06); color: var(--cyan);
  border-left: 2px solid var(--cyan); padding-left: 14px; font-weight: 500;
}
.tab-btn .count {
  background: var(--bg4); border-radius: 2px; padding: 1px 6px;
  font-size: 0.58rem; color: var(--text3); flex-shrink: 0; margin-left: 6px;
}
.tab-btn.active .count { background: rgba(0,229,200,0.1); color: var(--cyan2); }

/* CONTENT */
.content { flex: 1; overflow-y: auto; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-track { background: var(--bg); }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.panel-header {
  background: var(--bg2); padding: 13px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title { font-size: 0.75rem; font-weight: 700; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; }
.panel-info { font-size: 0.63rem; color: var(--text3); letter-spacing: 0.5px; }

/* STANDARD TABLE */
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 9px 20px; text-align: left; background: var(--bg3);
  color: var(--text3); font-size: 0.58rem; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  border-bottom: 1px solid var(--border); position: sticky; top: 47px;
}
tbody tr { border-bottom: 1px solid rgba(42,47,61,0.55); transition: background 0.08s; }
tbody tr:hover { background: var(--bg3); }
td { padding: 8px 20px; }
td.id-cell { color: var(--cyan); font-weight: 600; font-size: 0.8rem; white-space: nowrap; width: 110px; letter-spacing: 0.5px; }
td.desc-cell { color: var(--text); font-size: 0.77rem; line-height: 1.4; }
.highlight { background: rgba(0,229,200,0.18); color: var(--white); border-radius: 2px; padding: 0 2px; }

/* HOSPITAL CARDS TABLE */
.hosp-table { width: 100%; border-collapse: collapse; }
.hosp-table thead th {
  padding: 9px 16px; text-align: left; background: var(--bg3);
  color: var(--text3); font-size: 0.56rem; font-weight: 600;
  letter-spacing: 1.8px; text-transform: uppercase;
  border-bottom: 1px solid var(--border); position: sticky; top: 47px;
}
.hosp-table tbody tr { border-bottom: 1px solid rgba(42,47,61,0.5); transition: background 0.08s; }
.hosp-table tbody tr:hover { background: var(--bg3); }
.hosp-table tbody tr.cerrado { opacity: 0.5; }
.hosp-table td { padding: 9px 16px; vertical-align: top; }
.hosp-table td.hid { color: var(--cyan); font-weight: 700; font-size: 0.78rem; white-space: nowrap; width: 80px; }
.hosp-table td.hnom { color: var(--white); font-size: 0.77rem; font-weight: 500; line-height: 1.35; }
.hosp-table td.hnom .hdir { color: var(--text2); font-size: 0.68rem; margin-top: 2px; font-weight: 400; }
.hosp-table td.hmeta { font-size: 0.67rem; color: var(--text2); white-space: nowrap; }
.hosp-table td.hmeta .htel { color: var(--cyan2); display: block; margin-bottom: 2px; }
.hosp-table td.hmeta .hcp  { color: var(--text3); }
.hosp-table td.hcamas { font-size: 0.72rem; color: var(--text2); text-align: right; white-space: nowrap; }
.hosp-table td.hcamas b { color: var(--white); }
.badge-cerrado {
  display: inline-block; font-size: 0.52rem; padding: 1px 5px;
  background: rgba(255,179,71,0.12); border: 1px solid rgba(255,179,71,0.3);
  color: var(--warn); border-radius: 2px; letter-spacing: 1px;
  margin-left: 6px; vertical-align: middle;
}
.highlight-hosp { background: rgba(167,139,250,0.2); color: var(--white); border-radius: 2px; padding: 0 2px; }

/* EMPTY */
.empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }
.empty-state .icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.35; }
.empty-state p { font-size: 0.73rem; letter-spacing: 0.5px; }

/* GROUP HEADER */
.group-header {
  background: var(--bg3); padding: 8px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); border-top: 1px solid var(--border2);
  cursor: pointer; transition: background 0.12s; user-select: none;
}
.group-header:hover { background: var(--bg4); }
.group-header:hover .group-label { color: var(--cyan); }
.group-header:hover .group-hint { opacity: 1; }
.group-label { font-size: 0.6rem; font-weight: 700; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; transition: color 0.12s; }
.group-right { display: flex; align-items: center; gap: 10px; }
.group-hint { font-size: 0.58rem; color: var(--cyan); opacity: 0; transition: opacity 0.12s; }
.group-arrow { font-size: 0.58rem; color: var(--text3); }
.group-header:hover .group-arrow { color: var(--cyan); }

/* FOOTER */
footer {
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 9px 36px; display: flex; align-items: center; justify-content: space-between;
  font-size: 0.58rem; color: var(--text3); letter-spacing: 0.8px;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
}
footer a { color: var(--cyan2); text-decoration: none; }
footer a:hover { color: var(--cyan); }
.footer-dot { color: var(--border2); margin: 0 8px; }

// Tabs — put DD_HOSPITALES first for visibility
const allTabs = Object.keys(DATA);
const HOSP_TAB = 'DD_HOSPITALES';
const tabs = allTabs.slice().sort((a, b) => a.localeCompare(b, 'es', {sensitivity:'base'}));

let activeTabIndex = 0;
let searchTerm = '';

const sidebar    = document.getElementById('sidebar');
const content    = document.getElementById('content');
const searchInput = document.getElementById('searchInput');
const searchCounter = document.getElementById('searchCounter');

function escapeHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function hl(text, term, cls) {
  if (!term) return escapeHtml(text);
  cls = cls || 'highlight';
  const escaped = escapeHtml(text);
  const re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(re, '<span class="' + cls + '">$1</span>');
}

function isHospTab(tab) { return tab === HOSP_TAB; }

function buildSidebar() {
  const section = document.getElementById('sidebarSection');
  sidebar.innerHTML = '';
  sidebar.appendChild(section);
  tabs.forEach(function(tab, i) {
    const items = DATA[tab] || [];
    const btn = document.createElement('button');
    const isH = isHospTab(tab);
    btn.className = 'tab-btn' + (i === activeTabIndex ? ' active' : '');
    const nameSpan = document.createElement('span');
    nameSpan.className = 'name';
    nameSpan.textContent = tab;
    const countSpan = document.createElement('span');
    countSpan.className = 'count';
    countSpan.textContent = items.length;
    btn.appendChild(nameSpan);
    btn.appendChild(countSpan);
    btn.title = tab;
    btn.addEventListener('click', function() {
      activeTabIndex = i;
      searchInput.value = '';
      searchTerm = '';
      searchCounter.textContent = '';
      buildSidebar();
      renderContent();
    });
    sidebar.appendChild(btn);
  });
}

function scrollSidebarToActive() {
  const activeBtn = sidebar.querySelector('.tab-btn.active');
  if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

/* ── HOSPITAL TABLE ── */
function renderHospTable(items, term) {
  if (items.length === 0) {
    return '<div class="empty-state"><div class="icon">◈</div><p>Sin resultados · <em>' + escapeHtml(term) + '</em></p></div>';
  }
  let html = '<table class="hosp-table"><thead><tr>'
    + '<th>CODID</th><th>Nombre · Dirección</th><th>Teléfono · CP</th><th style="text-align:right">Camas</th>'
    + '</tr></thead><tbody>';
  items.forEach(function(r) {
    const cerradoClass = r.cerrado ? ' cerrado' : '';
    const cerradoBadge = r.cerrado ? '<span class="badge-cerrado">CERRADO</span>' : '';
    const hcls = term ? 'highlight-hosp' : '';
    html += '<tr class="' + cerradoClass + '">'
      + '<td class="hid">' + hl(r.id, term, 'highlight-hosp') + '</td>'
      + '<td class="hnom">'
        + hl(r.desc, term, 'highlight-hosp') + cerradoBadge
        + (r.dir ? '<div class="hdir">' + hl(r.dir, term, 'highlight-hosp') + '</div>' : '')
      + '</td>'
      + '<td class="hmeta">'
        + (r.tel ? '<span class="htel">' + hl(r.tel, term, 'highlight-hosp') + '</span>' : '')
        + (r.cp ? '<span class="hcp">CP ' + hl(r.cp, term, 'highlight-hosp') + '</span>' : '')
      + '</td>'
      + '<td class="hcamas">' + (r.camas ? '<b>' + r.camas + '</b>' : '—') + '</td>'
      + '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

/* ── STANDARD TABLE ── */
function renderStdTable(items, term) {
  if (items.length === 0) {
    return '<div class="empty-state"><div class="icon">◈</div><p>Sin resultados · <em>' + escapeHtml(term) + '</em></p></div>';
  }
  let html = '<table><thead><tr><th>Código</th><th>Descripción</th></tr></thead><tbody>';
  items.forEach(function(r) {
    html += '<tr><td class="id-cell">' + hl(r.id, term) + '</td><td class="desc-cell">' + hl(r.desc, term) + '</td></tr>';
  });
  html += '</tbody></table>';
  return html;
}

function renderContent() {
  const tab = tabs[activeTabIndex];
  const items = DATA[tab] || [];
  const term = searchTerm.toLowerCase();
  const filtered = term
    ? items.filter(function(r) {
        return r.id.toLowerCase().includes(term) || r.desc.toLowerCase().includes(term)
          || (r.dir && r.dir.toLowerCase().includes(term))
          || (r.tel && r.tel.includes(term))
          || (r.cp && r.cp.includes(term));
      })
    : items;

  const isH = isHospTab(tab);
  const titleClass = '';
  let html = '<div class="panel-header">'
    + '<span class="panel-title' + titleClass + '">' + escapeHtml(tab) + '</span>'
    + '<span class="panel-info">' + filtered.length + ' / ' + items.length + ' registros</span>'
    + '</div>';

  html += isH ? renderHospTable(filtered, searchTerm) : renderStdTable(filtered, searchTerm);
  content.innerHTML = html;
}

function jumpToTab(index) {
  activeTabIndex = index;
  searchInput.value = '';
  searchTerm = '';
  searchCounter.textContent = '';
  buildSidebar();
  renderContent();
  scrollSidebarToActive();
  content.scrollTop = 0;
}

function renderGlobalSearch() {
  const term = searchTerm.toLowerCase();
  let totalCount = 0;
  let html = '';
  tabs.forEach(function(tab, i) {
    const items = DATA[tab] || [];
    const isH = isHospTab(tab);
    const filtered = items.filter(function(r) {
      return r.id.toLowerCase().includes(term) || r.desc.toLowerCase().includes(term)
        || (r.dir && r.dir.toLowerCase().includes(term))
        || (r.tel && r.tel.includes(term))
        || (r.cp && r.cp.includes(term));
    });
    if (filtered.length === 0) return;
    totalCount += filtered.length;
    html += '<div class="group-header" data-tabindex="' + i + '">'
      + '<span class="group-label">' + escapeHtml(tab) + ' (' + filtered.length + ')</span>'
      + '<span class="group-right"><span class="group-hint">ver tabla completa &#8594;</span><span class="group-arrow">&#9654;</span></span>'
      + '</div>';
    html += isH ? renderHospTable(filtered.slice(0,30), searchTerm) : renderStdTable(filtered, searchTerm);
    if (isH && filtered.length > 30) {
      html += '<div style="padding:8px 24px;font-size:0.63rem;color:var(--text3);border-bottom:1px solid var(--border)">... y ' + (filtered.length - 30) + ' más · haz clic en la cabecera para ver todos</div>';
    }
  });

  if (totalCount === 0) {
    content.innerHTML = '<div class="panel-header"><span class="panel-title">Búsqueda global</span></div>'
      + '<div class="empty-state"><div class="icon">◈</div><p>Sin resultados · <em>' + escapeHtml(searchTerm) + '</em></p></div>';
  } else {
    content.innerHTML = '<div class="panel-header"><span class="panel-title">Búsqueda &quot;' + escapeHtml(searchTerm) + '&quot;</span>'
      + '<span class="panel-info">' + totalCount + ' resultados</span></div>' + html;
    content.querySelectorAll('.group-header[data-tabindex]').forEach(function(el) {
      el.addEventListener('click', function() { jumpToTab(parseInt(el.dataset.tabindex, 10)); });
    });
  }
  searchCounter.textContent = totalCount + ' resultado' + (totalCount !== 1 ? 's' : '');
}

searchInput.addEventListener('input', function() {
  searchTerm = searchInput.value.trim();
  if (searchTerm.length >= 2) { renderGlobalSearch(); }
  else { searchCounter.textContent = ''; renderContent(); }
});

buildSidebar();
renderContent();
</script>
</body>
</html>
